name: ClaudeWidget
options:
  bundleIdPrefix: com.tobyhinshaw
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

targets:
  ClaudeWidget:
    type: application
    platform: macOS
    sources:
      - path: Sources
      - path: Resources
    resources:
      - path: Resources/AppIcon.icns
        optional: true
    info:
      path: ClaudeWidget-Info.plist
      properties:
        CFBundleDisplayName: Claude Widget
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        LSUIElement: true
        LSMinimumSystemVersion: "14.0"
        NSHumanReadableCopyright: "© 2026 Toby Hinshaw"
    entitlements:
      path: ClaudeWidget.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.network.client: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tobyhinshaw.claudewidget
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.10"
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: ClaudeWidget-Info.plist
